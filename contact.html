<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio - Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Genesis</a>
            <div class="hamburger" id="hamburger">☰</div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html">Academic Planner</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Contact Me</h2>

        <div class="contact-container">
            <form id="contactForm" novalidate>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name">
                    <div id="nameError" class="error-msg">Name is required.</div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@miva.edu.ng">
                    <div id="emailError" class="error-msg">Please enter a valid email address.</div>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="08012345678">
                    <div id="phoneError" class="error-msg">Phone number must contain only digits.</div>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="How can I help you?"></textarea>
                    <div id="messageError" class="error-msg">Message is required.</div>
                </div>

                <button type="submit">Send Message</button>
                <div id="formSuccess"
                    style="display:none; color: var(--success-color); margin-top: 1rem; font-weight: bold;">Message sent
                    successfully!</div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MIVA Open University</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/contact.js"></script>
</body>

</html>
